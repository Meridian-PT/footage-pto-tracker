<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Footage Tools - Time Off Tracker</title>
  <style>
    :root {
      --ft-primary: #1a1a2e;
      --ft-accent: #e94560;
      --ft-blue: #0f3460;
      --ft-surface: #f8f9fa;
      --ft-card: #ffffff;
      --ft-border: #e2e8f0;
      --ft-text: #1a1a2e;
      --ft-muted: #64748b;
      --ft-green: #10b981;
      --ft-orange: #f59e0b;
      --ft-red: #ef4444;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, 'Segoe UI', sans-serif; background: var(--ft-surface); color: var(--ft-text); line-height: 1.6; }

    /* Header */
    .header { background: var(--ft-primary); color: #fff; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    .header-logo { font-size: 1.2rem; font-weight: 700; }
    .header-logo span { color: var(--ft-accent); }
    .header-user { display: flex; align-items: center; gap: 12px; }
    .header-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--ft-accent); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.8rem; }
    .header-name { font-size: 0.85rem; }
    .header-role { font-size: 0.7rem; color: rgba(255,255,255,0.6); }
    .header-select { background: var(--ft-blue); color: #fff; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; padding: 6px 12px; font-size: 0.8rem; cursor: pointer; }

    /* Layout */
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

    /* Tab nav */
    .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--ft-border); margin-bottom: 20px; }
    .tab { background: none; border: none; padding: 10px 20px; font-size: 0.85rem; font-weight: 600; color: var(--ft-muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
    .tab:hover { color: var(--ft-text); }
    .tab.active { color: var(--ft-accent); border-bottom-color: var(--ft-accent); }

    /* Cards */
    .card { background: var(--ft-card); border: 1px solid var(--ft-border); border-radius: 10px; padding: 20px; margin-bottom: 16px; }
    .card-title { font-size: 1rem; font-weight: 700; margin-bottom: 12px; }

    /* Stats grid */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .stat { background: var(--ft-card); border: 1px solid var(--ft-border); border-radius: 10px; padding: 16px; text-align: center; }
    .stat-value { font-size: 1.8rem; font-weight: 700; }
    .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ft-muted); margin-top: 4px; }

    /* Tables */
    .table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .table th { text-align: left; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ft-muted); padding: 10px 12px; border-bottom: 2px solid var(--ft-border); }
    .table td { padding: 10px 12px; border-bottom: 1px solid var(--ft-border); }
    .table tr:hover td { background: rgba(233,69,96,0.03); }
    .table tr:last-child td { border-bottom: none; }

    /* Chips */
    .chip { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
    .chip-green { background: rgba(16,185,129,0.1); color: var(--ft-green); }
    .chip-orange { background: rgba(245,158,11,0.1); color: var(--ft-orange); }
    .chip-red { background: rgba(239,68,68,0.1); color: var(--ft-red); }
    .chip-blue { background: rgba(15,52,96,0.1); color: var(--ft-blue); }

    /* Buttons */
    .btn { border: none; border-radius: 6px; padding: 8px 20px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--ft-accent); color: #fff; }
    .btn-approve { background: var(--ft-green); color: #fff; }
    .btn-deny { background: var(--ft-red); color: #fff; }
    .btn-outline { background: none; border: 1px solid var(--ft-border); color: var(--ft-text); }
    .btn-sm { padding: 4px 12px; font-size: 0.75rem; }

    /* Form */
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 16px; }
    .form-label { display: block; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ft-muted); margin-bottom: 4px; }
    .form-input, .form-select { width: 100%; padding: 8px 12px; border: 1px solid var(--ft-border); border-radius: 6px; font-size: 0.85rem; font-family: inherit; background: var(--ft-surface); color: var(--ft-text); }
    .form-input:focus, .form-select:focus { outline: none; border-color: var(--ft-accent); }

    /* Calendar */
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 16px; }
    .cal-header { text-align: center; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; color: var(--ft-muted); padding: 6px 0; }
    .cal-day { text-align: center; padding: 8px 4px; font-size: 0.8rem; border-radius: 6px; min-height: 40px; }
    .cal-day.today { background: var(--ft-accent); color: #fff; font-weight: 700; }
    .cal-day.off { background: rgba(245,158,11,0.15); color: var(--ft-orange); font-weight: 600; }
    .cal-day.empty { color: #ccc; }
    .cal-month { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .cal-month-title { font-size: 1.1rem; font-weight: 700; }
    .cal-nav { background: none; border: 1px solid var(--ft-border); border-radius: 6px; padding: 4px 12px; cursor: pointer; font-size: 0.85rem; }

    /* Progress bar */
    .progress { height: 6px; background: var(--ft-border); border-radius: 3px; overflow: hidden; margin-top: 6px; }
    .progress-bar { height: 100%; border-radius: 3px; }

    /* Toast */
    .toast { position: fixed; bottom: 20px; right: 20px; background: var(--ft-primary); color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; z-index: 9999; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Off-list */
    .off-today { display: flex; flex-wrap: wrap; gap: 8px; }
    .off-badge { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); border-radius: 8px; padding: 8px 14px; font-size: 0.82rem; }
    .off-badge strong { color: var(--ft-text); }
    .off-badge span { color: var(--ft-muted); font-size: 0.75rem; }

    @media (max-width: 768px) {
      .form-grid { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .header { flex-direction: column; gap: 8px; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-logo">Footage <span>Tools</span> | Time Off Tracker</div>
  <div class="header-user">
    <select id="user-select" class="header-select" onchange="switchUser(this.value)"></select>
    <div class="header-avatar" id="user-avatar">MM</div>
  </div>
</div>

<div class="container">
  <div class="tabs" id="tabs"></div>
  <div id="content"></div>
</div>

<script>
var EMPLOYEES = [
  { id: 1, name: 'Matt (CEO)', role: 'admin', dept: 'Executive', balances: { vacation: { total: 20, used: 5, pending: 0 }, sick: { total: 5, used: 0, pending: 0 }, personal: { total: 3, used: 1, pending: 0 } }},
  { id: 2, name: 'Tina Marchetti', role: 'admin', dept: 'HR / Admin', balances: { vacation: { total: 15, used: 4, pending: 2 }, sick: { total: 5, used: 1, pending: 0 }, personal: { total: 3, used: 0, pending: 0 } }},
  { id: 3, name: 'Carlos Mendez', role: 'employee', dept: 'CNC Operations', balances: { vacation: { total: 10, used: 3, pending: 0 }, sick: { total: 5, used: 2, pending: 0 }, personal: { total: 3, used: 1, pending: 0 } }},
  { id: 4, name: 'Dylan Park', role: 'employee', dept: 'CNC Operations', balances: { vacation: { total: 10, used: 6, pending: 3 }, sick: { total: 5, used: 0, pending: 0 }, personal: { total: 3, used: 0, pending: 0 } }},
  { id: 5, name: 'Marcus Johnson', role: 'employee', dept: 'Service & Assembly', balances: { vacation: { total: 10, used: 2, pending: 0 }, sick: { total: 5, used: 1, pending: 0 }, personal: { total: 3, used: 2, pending: 0 } }},
  { id: 6, name: 'Priya Sharma', role: 'employee', dept: 'Engineering / QC', balances: { vacation: { total: 15, used: 5, pending: 0 }, sick: { total: 5, used: 0, pending: 0 }, personal: { total: 3, used: 0, pending: 1 } }},
  { id: 7, name: 'Jake Morrison', role: 'employee', dept: 'Shipping / Receiving', balances: { vacation: { total: 10, used: 2, pending: 0 }, sick: { total: 5, used: 3, pending: 0 }, personal: { total: 3, used: 0, pending: 0 } }},
  { id: 8, name: 'Aisha Williams', role: 'employee', dept: 'Sales / Customer Support', balances: { vacation: { total: 15, used: 8, pending: 0 }, sick: { total: 5, used: 0, pending: 0 }, personal: { total: 3, used: 1, pending: 0 } }},
  { id: 9, name: 'David Shira', role: 'employee', dept: 'Engineering / QC', balances: { vacation: { total: 10, used: 1, pending: 5 }, sick: { total: 5, used: 0, pending: 0 }, personal: { total: 3, used: 0, pending: 0 } }}
];

var REQUESTS = [
  { id: 1, empId: 4, type: 'vacation', start: '2026-07-21', end: '2026-07-25', days: 5, reason: 'Family trip', status: 'pending', submitted: '2026-07-08' },
  { id: 2, empId: 9, type: 'vacation', start: '2026-07-28', end: '2026-08-01', days: 5, reason: 'Summer vacation', status: 'pending', submitted: '2026-07-09' },
  { id: 3, empId: 6, type: 'personal', start: '2026-07-15', end: '2026-07-15', days: 1, reason: 'Appointment', status: 'pending', submitted: '2026-07-10' },
  { id: 4, empId: 2, type: 'vacation', start: '2026-08-11', end: '2026-08-15', days: 5, reason: 'Summer holiday', status: 'approved', submitted: '2026-07-01' },
  { id: 5, empId: 3, type: 'sick', start: '2026-07-07', end: '2026-07-07', days: 1, reason: '', status: 'approved', submitted: '2026-07-07' },
  { id: 6, empId: 8, type: 'vacation', start: '2026-07-14', end: '2026-07-18', days: 5, reason: 'Beach trip', status: 'approved', submitted: '2026-06-28' },
  { id: 7, empId: 5, type: 'vacation', start: '2026-07-10', end: '2026-07-11', days: 2, reason: 'Moving day', status: 'approved', submitted: '2026-07-03' },
  { id: 8, empId: 7, type: 'sick', start: '2026-07-09', end: '2026-07-09', days: 1, reason: 'Not feeling well', status: 'approved', submitted: '2026-07-09' }
];

var STATE = { userId: 1, tab: 'dashboard', calMonth: 6, calYear: 2026 };

function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.appendChild(document.createTextNode(s)); return d.innerHTML; }
function toast(m) { var t = document.createElement('div'); t.className='toast'; t.textContent=m; document.body.appendChild(t); setTimeout(function(){t.remove()},3000); }
function getUser() { return EMPLOYEES.find(function(e){return e.id===STATE.userId}); }
function isAdmin() { var u = getUser(); return u && u.role === 'admin'; }
function empName(id) { var e = EMPLOYEES.find(function(emp){return emp.id===id}); return e ? e.name : '?'; }

function switchUser(id) { STATE.userId = parseInt(id); render(); }
function switchTab(t) { STATE.tab = t; render(); }

function render() {
  var u = getUser();
  // User select
  var sel = document.getElementById('user-select');
  sel.innerHTML = EMPLOYEES.map(function(e){ return '<option value="'+e.id+'"'+(e.id===STATE.userId?' selected':'')+'>'+esc(e.name)+'</option>'; }).join('');
  document.getElementById('user-avatar').textContent = u.name.split(' ').map(function(w){return w[0]}).join('').substring(0,2).toUpperCase();

  // Tabs
  var tabs = [{ id:'dashboard', label:'Dashboard' },{ id:'request', label:'Request Time Off' },{ id:'calendar', label:'Calendar' }];
  if (isAdmin()) tabs.push({ id:'team', label:'Team Overview' },{ id:'approvals', label:'Approvals' });
  document.getElementById('tabs').innerHTML = tabs.map(function(t){ return '<button class="tab'+(STATE.tab===t.id?' active':'')+'" onclick="switchTab(\''+t.id+'\')">'+t.label+'</button>'; }).join('');

  var c = '';
  switch(STATE.tab) {
    case 'dashboard': c = renderDashboard(); break;
    case 'request': c = renderRequest(); break;
    case 'calendar': c = renderCalendar(); break;
    case 'team': c = renderTeam(); break;
    case 'approvals': c = renderApprovals(); break;
  }
  document.getElementById('content').innerHTML = c;
}

function renderDashboard() {
  var u = getUser();
  var b = u.balances;

  var balCards = ['vacation','sick','personal'].map(function(type) {
    var bal = b[type];
    var remain = bal.total - bal.used - bal.pending;
    var pct = bal.total > 0 ? Math.round((bal.used/bal.total)*100) : 0;
    var colors = { vacation: 'var(--ft-blue)', sick: 'var(--ft-orange)', personal: 'var(--ft-green)' };
    var labels = { vacation: 'Vacation', sick: 'Sick Days', personal: 'Personal Days' };
    return '<div class="stat"><div class="stat-value" style="color:'+colors[type]+'">'+remain+'</div><div class="stat-label">'+labels[type]+' remaining</div><div class="progress"><div class="progress-bar" style="width:'+pct+'%;background:'+colors[type]+';"></div></div><div style="font-size:0.7rem;color:var(--ft-muted);margin-top:4px;">'+bal.used+' used / '+bal.pending+' pending / '+bal.total+' total</div></div>';
  }).join('');

  // My upcoming
  var myRequests = REQUESTS.filter(function(r){ return r.empId === u.id && r.status !== 'denied'; }).sort(function(a,b){ return a.start > b.start ? 1 : -1; });
  var myRows = myRequests.length > 0 ? myRequests.map(function(r){
    var chip = r.status === 'approved' ? '<span class="chip chip-green">Approved</span>' : '<span class="chip chip-orange">Pending</span>';
    return '<tr><td>'+r.type.charAt(0).toUpperCase()+r.type.slice(1)+'</td><td>'+r.start+'</td><td>'+r.end+'</td><td>'+r.days+'</td><td>'+chip+'</td></tr>';
  }).join('') : '<tr><td colspan="5" style="text-align:center;color:var(--ft-muted);padding:20px;">No upcoming time off</td></tr>';

  // Who's off today
  var today = '2026-07-13';
  var offToday = REQUESTS.filter(function(r){ return r.status==='approved' && r.start <= today && r.end >= today; });
  var offHtml = offToday.length > 0 ? '<div class="off-today">'+offToday.map(function(r){ return '<div class="off-badge"><strong>'+esc(empName(r.empId))+'</strong> <span>'+r.type+'</span></div>'; }).join('')+'</div>' : '<div style="color:var(--ft-muted);font-size:0.85rem;">Everyone is in today</div>';

  return '<div class="stats">'+balCards+'</div>' +
    '<div class="card"><div class="card-title">Who\'s Off Today</div>'+offHtml+'</div>' +
    '<div class="card"><div class="card-title">My Upcoming Time Off</div><div style="overflow-x:auto;"><table class="table"><thead><tr><th>Type</th><th>Start</th><th>End</th><th>Days</th><th>Status</th></tr></thead><tbody>'+myRows+'</tbody></table></div></div>';
}

function renderRequest() {
  return '<div class="card"><div class="card-title">Request Time Off</div>' +
    '<div class="form-grid">' +
      '<div><label class="form-label">Type</label><select class="form-select" id="req-type"><option value="vacation">Vacation</option><option value="sick">Sick Day</option><option value="personal">Personal Day</option></select></div>' +
      '<div><label class="form-label">Start Date</label><input type="date" class="form-input" id="req-start"></div>' +
      '<div><label class="form-label">End Date</label><input type="date" class="form-input" id="req-end"></div>' +
      '<div><label class="form-label">Reason (optional)</label><input type="text" class="form-input" id="req-reason" placeholder="Brief note"></div>' +
    '</div>' +
    '<button class="btn btn-primary" onclick="submitRequest()">Submit Request</button>' +
  '</div>';
}

function submitRequest() {
  var type = document.getElementById('req-type').value;
  var start = document.getElementById('req-start').value;
  var end = document.getElementById('req-end').value;
  var reason = document.getElementById('req-reason').value;
  if (!start || !end) { toast('Please select start and end dates'); return; }
  if (end < start) { toast('End date must be after start date'); return; }

  var days = Math.round((new Date(end) - new Date(start)) / (1000*60*60*24)) + 1;
  var u = getUser();
  var bal = u.balances[type];
  var remain = bal.total - bal.used - bal.pending;
  if (days > remain) { toast('Insufficient balance. You have '+remain+' '+type+' days remaining.'); return; }

  REQUESTS.push({ id: REQUESTS.length+1, empId: u.id, type: type, start: start, end: end, days: days, reason: reason, status: 'pending', submitted: '2026-07-13' });
  bal.pending += days;
  toast('Request submitted! '+days+' day(s) of '+type+' from '+start+' to '+end);
  STATE.tab = 'dashboard';
  render();
}

function renderCalendar() {
  var m = STATE.calMonth;
  var y = STATE.calYear;
  var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  var firstDay = new Date(y, m, 1).getDay();
  var daysInMonth = new Date(y, m+1, 0).getDate();

  // Get approved time off for this month
  var offDays = {};
  REQUESTS.filter(function(r){ return r.status==='approved'; }).forEach(function(r) {
    var s = new Date(r.start); var e = new Date(r.end);
    for (var d = new Date(s); d <= e; d.setDate(d.getDate()+1)) {
      if (d.getMonth() === m && d.getFullYear() === y) {
        var key = d.getDate();
        if (!offDays[key]) offDays[key] = [];
        offDays[key].push(empName(r.empId));
      }
    }
  });

  var cells = '';
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(function(d){ cells += '<div class="cal-header">'+d+'</div>'; });
  for (var i = 0; i < firstDay; i++) cells += '<div class="cal-day empty"></div>';
  for (var d = 1; d <= daysInMonth; d++) {
    var isToday = (d === 13 && m === 6 && y === 2026);
    var isOff = offDays[d];
    var cls = 'cal-day' + (isToday ? ' today' : '') + (isOff ? ' off' : '');
    var title = isOff ? isOff.join(', ') + ' off' : '';
    cells += '<div class="'+cls+'" title="'+esc(title)+'">'+d+(isOff ? '<div style="font-size:0.55rem;margin-top:2px;">'+isOff.length+' off</div>' : '')+'</div>';
  }

  return '<div class="card">' +
    '<div class="cal-month"><button class="cal-nav" onclick="calNav(-1)">&larr;</button><div class="cal-month-title">'+months[m]+' '+y+'</div><button class="cal-nav" onclick="calNav(1)">&rarr;</button></div>' +
    '<div class="cal-grid">'+cells+'</div>' +
    (Object.keys(offDays).length > 0 ? '<div style="font-size:0.75rem;color:var(--ft-muted);"><strong>Legend:</strong> Orange = approved time off. Hover for names.</div>' : '') +
  '</div>';
}

function calNav(dir) { STATE.calMonth += dir; if (STATE.calMonth > 11) { STATE.calMonth=0; STATE.calYear++; } if (STATE.calMonth < 0) { STATE.calMonth=11; STATE.calYear--; } render(); }

function renderTeam() {
  var rows = EMPLOYEES.map(function(e) {
    var totalUsed = e.balances.vacation.used + e.balances.sick.used + e.balances.personal.used;
    var totalRemain = (e.balances.vacation.total - e.balances.vacation.used - e.balances.vacation.pending) + (e.balances.sick.total - e.balances.sick.used) + (e.balances.personal.total - e.balances.personal.used - e.balances.personal.pending);
    var totalPending = e.balances.vacation.pending + e.balances.personal.pending;
    var pendingReqs = REQUESTS.filter(function(r){ return r.empId===e.id && r.status==='pending'; }).length;
    return '<tr><td><strong>'+esc(e.name)+'</strong></td><td><span class="chip chip-blue">'+e.dept+'</span></td>' +
      '<td>'+e.balances.vacation.used+'/'+e.balances.vacation.total+'</td>' +
      '<td>'+e.balances.sick.used+'/'+e.balances.sick.total+'</td>' +
      '<td>'+e.balances.personal.used+'/'+e.balances.personal.total+'</td>' +
      '<td>'+totalRemain+'</td>' +
      '<td>'+(pendingReqs > 0 ? '<span class="chip chip-orange">'+pendingReqs+' pending</span>' : '<span style="color:var(--ft-muted);">0</span>')+'</td></tr>';
  }).join('');

  // Accrual liability
  var totalUnused = EMPLOYEES.reduce(function(a,e){ return a + (e.balances.vacation.total - e.balances.vacation.used - e.balances.vacation.pending); }, 0);

  return '<div class="card"><div class="card-title">Team Balances</div><div style="overflow-x:auto;"><table class="table"><thead><tr><th>Employee</th><th>Department</th><th>Vacation</th><th>Sick</th><th>Personal</th><th>Total Remaining</th><th>Pending Requests</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>' +
    '<div class="stats"><div class="stat"><div class="stat-value" style="color:var(--ft-blue);">'+EMPLOYEES.length+'</div><div class="stat-label">Employees</div></div><div class="stat"><div class="stat-value" style="color:var(--ft-orange);">'+REQUESTS.filter(function(r){return r.status==='pending'}).length+'</div><div class="stat-label">Pending Requests</div></div><div class="stat"><div class="stat-value" style="color:var(--ft-green);">'+totalUnused+'</div><div class="stat-label">Unused Vacation Days</div></div></div>';
}

function renderApprovals() {
  var pending = REQUESTS.filter(function(r){ return r.status === 'pending'; });
  if (pending.length === 0) return '<div class="card" style="text-align:center;padding:40px;color:var(--ft-muted);">No pending requests. All caught up!</div>';

  var rows = pending.map(function(r) {
    var emp = EMPLOYEES.find(function(e){return e.id===r.empId});
    var bal = emp.balances[r.type];
    var remain = bal.total - bal.used - bal.pending;
    return '<div class="card" style="border-left:3px solid var(--ft-orange);">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">' +
        '<div><strong>'+esc(emp.name)+'</strong> <span class="chip chip-blue">'+emp.dept+'</span></div>' +
        '<span class="chip chip-orange">Pending</span>' +
      '</div>' +
      '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:12px;font-size:0.85rem;">' +
        '<div><span style="color:var(--ft-muted);">Type:</span> '+r.type+'</div>' +
        '<div><span style="color:var(--ft-muted);">Dates:</span> '+r.start+' to '+r.end+'</div>' +
        '<div><span style="color:var(--ft-muted);">Days:</span> '+r.days+'</div>' +
        '<div><span style="color:var(--ft-muted);">Balance after:</span> '+(remain-r.days)+' '+r.type+' days</div>' +
        (r.reason ? '<div><span style="color:var(--ft-muted);">Reason:</span> '+esc(r.reason)+'</div>' : '') +
      '</div>' +
      '<div style="display:flex;gap:8px;">' +
        '<button class="btn btn-approve btn-sm" onclick="approveReq('+r.id+')">Approve</button>' +
        '<button class="btn btn-deny btn-sm" onclick="denyReq('+r.id+')">Deny</button>' +
      '</div>' +
    '</div>';
  }).join('');

  return '<div class="card-title" style="margin-bottom:12px;">Pending Approvals ('+pending.length+')</div>' + rows;
}

function approveReq(id) {
  var r = REQUESTS.find(function(req){return req.id===id});
  if (!r) return;
  r.status = 'approved';
  var emp = EMPLOYEES.find(function(e){return e.id===r.empId});
  emp.balances[r.type].used += r.days;
  emp.balances[r.type].pending -= r.days;
  toast('Approved: '+empName(r.empId)+' '+r.type+' ('+r.start+' to '+r.end+')');
  render();
}

function denyReq(id) {
  var r = REQUESTS.find(function(req){return req.id===id});
  if (!r) return;
  r.status = 'denied';
  var emp = EMPLOYEES.find(function(e){return e.id===r.empId});
  emp.balances[r.type].pending -= r.days;
  toast('Denied: '+empName(r.empId)+' '+r.type);
  render();
}

document.addEventListener('DOMContentLoaded', function(){ render(); });
</script>
</body>
</html>

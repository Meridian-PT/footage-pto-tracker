<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Footage Tools - Time Off Tracker</title>
  <style>
    :root {
      --ft-primary: #1a1a2e;
      --ft-accent: #e94560;
      --ft-blue: #0f3460;
      --ft-surface: #f8f9fa;
      --ft-card: #ffffff;
      --ft-border: #e2e8f0;
      --ft-text: #1a1a2e;
      --ft-muted: #64748b;
      --ft-green: #10b981;
      --ft-orange: #f59e0b;
      --ft-red: #ef4444;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--ft-surface); color: var(--ft-text); line-height: 1.6; }

    /* Header */
    .header { background: var(--ft-primary); color: #fff; padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
    .header-logo { font-size: 1.15rem; font-weight: 700; white-space: nowrap; }
    .header-logo span { color: var(--ft-accent); }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .header-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--ft-accent); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.75rem; flex-shrink: 0; }
    .header-info { display: flex; flex-direction: column; line-height: 1.2; }
    .header-name { font-size: 0.82rem; font-weight: 600; }
    .header-role { font-size: 0.68rem; color: rgba(255,255,255,0.55); }
    .header-select { background: var(--ft-blue); color: #fff; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; padding: 7px 10px; font-size: 0.78rem; cursor: pointer; max-width: 220px; font-family: inherit; }
    .header-select option { background: var(--ft-primary); color: #fff; }
    .header-select optgroup { font-weight: 700; font-style: normal; color: rgba(255,255,255,0.7); }

    /* Layout */
    .container { max-width: 1200px; margin: 0 auto; padding: 16px; }

    /* Tab nav */
    .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--ft-border); margin-bottom: 18px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .tab { background: none; border: none; padding: 10px 18px; font-size: 0.82rem; font-weight: 600; color: var(--ft-muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; white-space: nowrap; font-family: inherit; }
    .tab:hover { color: var(--ft-text); }
    .tab.active { color: var(--ft-accent); border-bottom-color: var(--ft-accent); }
    .tab .badge { display: inline-block; background: var(--ft-accent); color: #fff; font-size: 0.65rem; border-radius: 10px; padding: 1px 7px; margin-left: 5px; font-weight: 700; }

    /* Cards */
    .card { background: var(--ft-card); border: 1px solid var(--ft-border); border-radius: 10px; padding: 18px; margin-bottom: 14px; }
    .card-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 10px; }

    /* Stats grid */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 18px; }
    .stat { background: var(--ft-card); border: 1px solid var(--ft-border); border-radius: 10px; padding: 16px; text-align: center; }
    .stat-value { font-size: 1.7rem; font-weight: 700; }
    .stat-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ft-muted); margin-top: 3px; }
    .stat-detail { font-size: 0.68rem; color: var(--ft-muted); margin-top: 4px; }

    /* Progress bar */
    .progress { height: 5px; background: var(--ft-border); border-radius: 3px; overflow: hidden; margin-top: 6px; }
    .progress-bar { height: 100%; border-radius: 3px; transition: width 0.3s; }

    /* Tables */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .table th { text-align: left; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ft-muted); padding: 9px 10px; border-bottom: 2px solid var(--ft-border); white-space: nowrap; }
    .table td { padding: 9px 10px; border-bottom: 1px solid var(--ft-border); }
    .table tr:hover td { background: rgba(233,69,96,0.03); }
    .table tr:last-child td { border-bottom: none; }

    /* Chips */
    .chip { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.02em; }
    .chip-green { background: rgba(16,185,129,0.1); color: var(--ft-green); }
    .chip-orange { background: rgba(245,158,11,0.1); color: var(--ft-orange); }
    .chip-red { background: rgba(239,68,68,0.1); color: var(--ft-red); }
    .chip-blue { background: rgba(15,52,96,0.1); color: var(--ft-blue); }
    .chip-gray { background: rgba(100,116,139,0.1); color: var(--ft-muted); }

    /* Buttons */
    .btn { border: none; border-radius: 6px; padding: 8px 18px; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; font-family: inherit; }
    .btn:hover { opacity: 0.85; }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--ft-accent); color: #fff; }
    .btn-approve { background: var(--ft-green); color: #fff; }
    .btn-deny { background: var(--ft-red); color: #fff; }
    .btn-outline { background: none; border: 1px solid var(--ft-border); color: var(--ft-text); }
    .btn-sm { padding: 5px 12px; font-size: 0.75rem; }

    /* Form */
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 14px; }
    .form-group { display: flex; flex-direction: column; }
    .form-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ft-muted); margin-bottom: 4px; }
    .form-input, .form-select, .form-textarea { width: 100%; padding: 8px 12px; border: 1px solid var(--ft-border); border-radius: 6px; font-size: 0.82rem; font-family: inherit; background: #fff; color: var(--ft-text); }
    .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--ft-accent); box-shadow: 0 0 0 2px rgba(233,69,96,0.15); }
    .form-textarea { min-height: 60px; resize: vertical; }
    .form-hint { font-size: 0.7rem; color: var(--ft-muted); margin-top: 3px; }

    /* Calendar */
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .cal-header { text-align: center; font-size: 0.62rem; font-weight: 700; text-transform: uppercase; color: var(--ft-muted); padding: 6px 0; }
    .cal-day { text-align: center; padding: 6px 2px; font-size: 0.78rem; border-radius: 6px; min-height: 48px; cursor: default; position: relative; }
    .cal-day.today { background: var(--ft-accent); color: #fff; font-weight: 700; }
    .cal-day.has-off { background: rgba(245,158,11,0.12); }
    .cal-day.today.has-off { background: var(--ft-accent); }
    .cal-day.empty { color: #ccc; }
    .cal-day .cal-names { font-size: 0.5rem; color: var(--ft-orange); line-height: 1.2; margin-top: 1px; overflow: hidden; max-height: 24px; }
    .cal-day.today .cal-names { color: rgba(255,255,255,0.8); }
    .cal-month-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .cal-month-title { font-size: 1.05rem; font-weight: 700; }
    .cal-nav { background: none; border: 1px solid var(--ft-border); border-radius: 6px; padding: 5px 14px; cursor: pointer; font-size: 0.85rem; font-family: inherit; }
    .cal-nav:hover { background: var(--ft-surface); }

    /* Off today */
    .off-today { display: flex; flex-wrap: wrap; gap: 8px; }
    .off-badge { background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.25); border-radius: 8px; padding: 7px 12px; font-size: 0.8rem; }
    .off-badge strong { color: var(--ft-text); }
    .off-badge .off-type { color: var(--ft-muted); font-size: 0.72rem; margin-left: 4px; }

    /* Filter bar */
    .filter-bar { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
    .filter-bar label { font-size: 0.72rem; font-weight: 600; color: var(--ft-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .filter-select { padding: 5px 10px; border: 1px solid var(--ft-border); border-radius: 6px; font-size: 0.8rem; font-family: inherit; background: #fff; }

    /* Approval card */
    .approval-card { border-left: 3px solid var(--ft-orange); }
    .approval-card.approved { border-left-color: var(--ft-green); }
    .approval-card.denied { border-left-color: var(--ft-red); }
    .approval-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    .approval-details { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 6px; margin-bottom: 10px; font-size: 0.82rem; }
    .approval-detail-label { color: var(--ft-muted); font-size: 0.72rem; }
    .approval-actions { display: flex; gap: 8px; }

    /* Toast */
    .toast { position: fixed; bottom: 20px; right: 20px; background: var(--ft-primary); color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 0.82rem; font-weight: 600; z-index: 9999; animation: toastIn 0.3s ease; max-width: 360px; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Empty state */
    .empty-state { text-align: center; padding: 40px 20px; color: var(--ft-muted); font-size: 0.88rem; }

    /* Responsive */
    @media (max-width: 768px) {
      .header { flex-direction: column; gap: 10px; padding: 12px 16px; }
      .header-right { width: 100%; justify-content: space-between; }
      .header-select { max-width: none; flex: 1; }
      .container { padding: 12px; }
      .stats { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .approval-details { grid-template-columns: 1fr 1fr; }
      .cal-day { min-height: 38px; font-size: 0.72rem; padding: 4px 1px; }
      .cal-day .cal-names { display: none; }
      .stat-value { font-size: 1.4rem; }
      .tab { padding: 8px 12px; font-size: 0.78rem; }
    }
    @media (min-width: 769px) and (max-width: 1024px) {
      .stats { grid-template-columns: repeat(3, 1fr); }
    }
    /* Login screen */
    .login-overlay { min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--ft-primary); padding:20px; }
    .login-box { background:var(--ft-card); border-radius:12px; padding:32px; max-width:380px; width:100%; text-align:center; }
    .login-box h1 { font-size:1.3rem; margin-bottom:4px; }
    .login-box h1 span { color:var(--ft-accent); }
    .login-box .sub { font-size:0.82rem; color:var(--ft-muted); margin-bottom:24px; }
    .login-box .form-group { text-align:left; margin-bottom:14px; }
    .login-box .login-btn { width:100%; padding:12px; font-size:0.9rem; }
    .login-error { color:var(--ft-red); font-size:0.8rem; margin-top:8px; min-height:20px; }
    .pin-dots { display:flex; gap:10px; justify-content:center; margin:12px 0; }
    .pin-dot { width:48px; height:48px; border:2px solid var(--ft-border); border-radius:8px; text-align:center; font-size:1.3rem; font-weight:700; font-family:inherit; letter-spacing:4px; }
    .pin-dot:focus { border-color:var(--ft-accent); outline:none; }

    /* Settings tab */
    .pin-change-box { max-width:300px; }
  </style>
</head>

                   'CNC Production','CNC - Mills','CNC - Lathes',
                   'Engineering','Sales','Finance','Marketing','Human Resources'];
  var deptGroups = {};
  EMP.forEach(function(e) {
    if (!deptGroups[e.dept]) deptGroups[e.dept] = [];
    deptGroups[e.dept].push(e);
  });
  var html = '';
  deptOrder.forEach(function(dept) {
    var group = deptGroups[dept];
    if (!group || group.length === 0) return;

  });

}

function doLogin() {
  var empId = parseInt(document.getElementById('loginName').value);
  var pin = document.getElementById('loginPin').value;

function logout() {

  S.tab = 'dashboard';

// ─── HELPERS ──────────────────────────────────────────────
function empById(id)  { for (var i=0;i<EMP.length;i++) if (EMP[i].id===id) return EMP[i]; return null; }
function curUser()    { return empById(S.uid); }
function isAdmin(e)   { return e && e.role === 'admin'; }
function isManager(e) { return e && (e.role === 'manager' || e.role === 'admin'); }

function esc(s) {
  if (!s) return '';
  var d = document.createElement('div');
  d.appendChild(document.createTextNode(s));
  return d.innerHTML;
}

function toast(msg) {
  var el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function(){ el.remove(); }, 3500);
}

function initials(name) {
  return name.split(' ').map(function(w){ return w[0]; }).join('').substring(0,2).toUpperCase();
}

// Get employees this user can see (for managers: direct reports; for admins: everyone)
function visibleEmployees() {
  var u = curUser();
  if (!u) return [];
  if (isAdmin(u)) return EMP.slice();
  if (u.role === 'manager' && u.manages.length > 0) {
    // Manager sees themselves + their direct reports
    var ids = {};
    ids[u.id] = true;
    u.manages.forEach(function(mid){ ids[mid] = true; });
    return EMP.filter(function(e){ return ids[e.id]; });
  }
  // Employee: just themselves
  return EMP.filter(function(e){ return e.id === u.id; });
}

// Get only direct reports (not self) for approval purposes
function directReports() {
  var u = curUser();
  if (!u) return [];
  if (isAdmin(u)) return EMP.filter(function(e){ return e.id !== u.id; });
  if (u.role === 'manager' && u.manages.length > 0) {
    var ids = {};
    u.manages.forEach(function(mid){ ids[mid] = true; });
    return EMP.filter(function(e){ return ids[e.id]; });
  }
  return [];
}

function pendingForMe() {
  var reports = directReports();
  var ids = {};
  reports.forEach(function(e){ ids[e.id] = true; });
  return REQ.filter(function(r){ return r.status === 'pending' && ids[r.empId]; });
}

function departments() {
  var d = {};
  EMP.forEach(function(e){ d[e.dept] = true; });
  return Object.keys(d).sort();
}

function biz(startStr, endStr) {
  // Count business days (weekdays) between two dates inclusive
  var s = new Date(startStr + 'T00:00:00');
  var e = new Date(endStr + 'T00:00:00');
  var count = 0;
  var cur = new Date(s);
  while (cur <= e) {
    var dow = cur.getDay();
    if (dow !== 0 && dow !== 6) count++;
    cur.setDate(cur.getDate() + 1);
  }
  return count || 1;
}

// ─── USER SWITCH ──────────────────────────────────────────
function switchUser(id) {
  S.uid = id;
  S.tab = 'dashboard';
  S.deptFilter = 'all';
  render();
}

function switchTab(t) {
  S.tab = t;
  render();
}

// ─── RENDER ───────────────────────────────────────────────
function render() {
  var u = curUser();
  if (!u) return;

  // Header info
  document.getElementById('avatar').textContent = initials(u.name);
  document.getElementById('hdrName').textContent = u.name;
  document.getElementById('hdrRole').textContent = u.title;

  // (User select removed - login screen handles user selection now)

  // Tabs
  var tabs = [
    {id:'dashboard', label:'Dashboard'},
    {id:'request',   label:'Request Time Off'},
    {id:'calendar',  label:'Calendar'}
  ];
  if (isManager(u)) {
    var pCount = pendingForMe().length;
    tabs.push({id:'team', label:'Team'});
    tabs.push({id:'approvals', label:'Approvals', badge: pCount > 0 ? pCount : 0});
  }
  tabs.push({id:'settings', label:'Settings'});
  var tabHtml = '';
  tabs.forEach(function(t) {
    tabHtml += '<button class="tab' + (S.tab === t.id ? ' active' : '') + '" onclick="switchTab(\'' + t.id + '\')">' + t.label;
    if (t.badge && t.badge > 0) tabHtml += '<span class="badge">' + t.badge + '</span>';
    tabHtml += '</button>';
  });
  document.getElementById('tabBar').innerHTML = tabHtml;

  // Content
  var html = '';
  switch (S.tab) {
    case 'dashboard':  html = viewDashboard(); break;
    case 'request':    html = viewRequest(); break;
    case 'calendar':   html = viewCalendar(); break;
    case 'team':       html = viewTeam(); break;
    case 'approvals':  html = viewApprovals(); break;
    case 'settings':   html = viewSettings(); break;
    default:           html = viewDashboard();
  }
  document.getElementById('app').innerHTML = html;
}

// ─── DASHBOARD ────────────────────────────────────────────
function viewDashboard() {
  var u = curUser();
  var b = u.bal;
  var types = ['vacation','sick'];
  var labels = {vacation:'Vacation', sick:'Sick Days'};
  var colors = {vacation:'var(--ft-blue)', sick:'var(--ft-orange)'};

  var statsHtml = '';
  types.forEach(function(type) {
    var bl = b[type];
    var remain = bl.total - bl.used - bl.pending;
    var pct = bl.total > 0 ? Math.round(((bl.used + bl.pending) / bl.total) * 100) : 0;
    statsHtml += '<div class="stat">' +
      '<div class="stat-value" style="color:' + colors[type] + '">' + remain + '</div>' +
      '<div class="stat-label">' + labels[type] + ' Remaining</div>' +
      '<div class="progress"><div class="progress-bar" style="width:' + pct + '%;background:' + colors[type] + '"></div></div>' +
      '<div class="stat-detail">' + bl.used + ' used' + (bl.pending > 0 ? ' &middot; ' + bl.pending + ' pending' : '') + ' &middot; ' + bl.total + ' total</div>' +
    '</div>';
  });

  // Who's off today
  var today = '2026-07-13';
  var offToday = REQ.filter(function(r) {
    return r.status === 'approved' && r.start <= today && r.end >= today;
  });
  var offHtml = '';
  if (offToday.length > 0) {
    offHtml = '<div class="off-today">';
    offToday.forEach(function(r) {
      var emp = empById(r.empId);
      offHtml += '<div class="off-badge"><strong>' + esc(emp ? emp.name : '?') + '</strong><span class="off-type">' + r.type + '</span></div>';
    });
    offHtml += '</div>';
  } else {
    offHtml = '<div style="color:var(--ft-muted);font-size:0.85rem;">Everyone is in today</div>';
  }

  // My requests
  var myReqs = REQ.filter(function(r){ return r.empId === u.id; }).sort(function(a,b){ return a.start > b.start ? 1 : -1; });
  var reqRows = '';
  if (myReqs.length > 0) {
    myReqs.forEach(function(r) {
      var chipClass = r.status === 'approved' ? 'chip-green' : (r.status === 'pending' ? 'chip-orange' : 'chip-red');
      reqRows += '<tr>' +
        '<td>' + r.type.charAt(0).toUpperCase() + r.type.slice(1) + '</td>' +
        '<td>' + r.start + '</td>' +
        '<td>' + r.end + '</td>' +
        '<td>' + r.days + '</td>' +
        '<td><span class="chip ' + chipClass + '">' + r.status + '</span></td>' +
      '</tr>';
    });
  } else {
    reqRows = '<tr><td colspan="5" class="empty-state">No time off requests yet</td></tr>';
  }

  return '<div class="stats">' + statsHtml + '</div>' +
    '<div class="card"><div class="card-title">Who\'s Off Today</div>' + offHtml + '</div>' +
    '<div class="card"><div class="card-title">My Time Off Requests</div>' +
      '<div class="table-wrap"><table class="table"><thead><tr>' +
        '<th>Type</th><th>Start</th><th>End</th><th>Days</th><th>Status</th>' +
      '</tr></thead><tbody>' + reqRows + '</tbody></table></div></div>';
}

// ─── REQUEST TIME OFF ─────────────────────────────────────
function viewRequest() {
  var u = curUser();
  var b = u.bal;
  var vRem = b.vacation.total - b.vacation.used - b.vacation.pending;
  var sRem = b.sick.total - b.sick.used - b.sick.pending;
  return '<div class="card"><div class="card-title">Request Time Off</div>' +
    '<div style="margin-bottom:14px;font-size:0.82rem;color:var(--ft-muted);">' +
      'Available: <strong style="color:var(--ft-blue)">' + vRem + '</strong> vacation &middot; ' +
      '<strong style="color:var(--ft-orange)">' + sRem + '</strong> sick' +
    '</div>' +
    '<div class="form-grid">' +
      '<div class="form-group"><label class="form-label">Leave Type</label>' +
        '<select class="form-select" id="reqType">' +
          '<option value="vacation">Vacation (' + vRem + ' remaining)</option>' +
          '<option value="sick">Sick Day (' + sRem + ' remaining)</option>' +
        '</select></div>' +
      '<div class="form-group"><label class="form-label">Start Date</label><input type="date" class="form-input" id="reqStart"></div>' +
      '<div class="form-group"><label class="form-label">End Date</label><input type="date" class="form-input" id="reqEnd"></div>' +
    '</div>' +
    '<div class="form-group" style="margin-bottom:14px;">' +
      '<label class="form-label">Reason (optional)</label>' +
      '<input type="text" class="form-input" id="reqReason" placeholder="Brief description">' +
    '</div>' +
    '<button class="btn btn-primary" onclick="submitRequest()">Submit Request</button>' +

function submitRequest() {
  var type = document.getElementById('reqType').value;
  var start = document.getElementById('reqStart').value;
  var end = document.getElementById('reqEnd').value;
  var reason = document.getElementById('reqReason').value;

  if (!start || !end) { toast('Please select both start and end dates.'); return; }
  if (end < start) { toast('End date cannot be before start date.'); return; }

  var days = biz(start, end);
  var u = curUser();
  var bl = u.bal[type];
  var remain = bl.total - bl.used - bl.pending;

  if (days > remain) {
    toast('Insufficient balance: you have ' + remain + ' ' + type + ' day(s) remaining, but requested ' + days + '.');
    return;
  }

  REQ.push({
    id: nextReqId++,
    empId: u.id,
    type: type,
    start: start,
    end: end,
    days: days,
    reason: reason,
    status: 'pending',
    submitted: '2026-07-13'
  });
  bl.pending += days;

  toast('Request submitted: ' + days + ' day(s) of ' + type + ' (' + start + ' to ' + end + ')');
  S.tab = 'dashboard';
  render();
}

// ─── CALENDAR ─────────────────────────────────────────────
function viewCalendar() {
  var m = S.calMonth;
  var y = S.calYear;
  var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  var firstDow = new Date(y, m, 1).getDay();
  var daysInMonth = new Date(y, m + 1, 0).getDate();

  // Calendar visibility: admins see everyone, others see their department
  var u = curUser();
  var calEmps;
  if (isAdmin(u)) {
    calEmps = EMP.slice();
  } else {
    calEmps = EMP.filter(function(e){ return e.dept === u.dept; });
  }
  var visIds = {};
  calEmps.forEach(function(e){ visIds[e.id] = true; });

  // Build off-days map
  var offMap = {};
  REQ.filter(function(r){ return r.status === 'approved' && visIds[r.empId]; }).forEach(function(r) {
    var s = new Date(r.start + 'T00:00:00');
    var e = new Date(r.end + 'T00:00:00');
    var cur = new Date(s);
    while (cur <= e) {
      if (cur.getMonth() === m && cur.getFullYear() === y) {
        var key = cur.getDate();
        if (!offMap[key]) offMap[key] = [];
        var emp = empById(r.empId);
        if (emp) offMap[key].push(emp.name.split(' ')[0]);
      }
      cur.setDate(cur.getDate() + 1);
    }
  });

  var cells = '';
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(function(d) {
    cells += '<div class="cal-header">' + d + '</div>';
  });
  for (var i = 0; i < firstDow; i++) cells += '<div class="cal-day empty"></div>';
  for (var d = 1; d <= daysInMonth; d++) {
    var isToday = (d === 13 && m === 6 && y === 2026);
    var names = offMap[d];
    var cls = 'cal-day' + (isToday ? ' today' : '') + (names ? ' has-off' : '');
    var titleStr = names ? names.join(', ') + ' off' : '';
    cells += '<div class="' + cls + '" title="' + esc(titleStr) + '">' + d;
    if (names) {
      cells += '<div class="cal-names">' + names.slice(0, 3).join(', ') + (names.length > 3 ? ' +' + (names.length - 3) : '') + '</div>';
    }
    cells += '</div>';
  }

  return '<div class="card">' +
    '<div class="cal-month-nav">' +
      '<button class="cal-nav" onclick="navCal(-1)">&larr; Prev</button>' +
      '<div class="cal-month-title">' + months[m] + ' ' + y + '</div>' +
      '<button class="cal-nav" onclick="navCal(1)">Next &rarr;</button>' +
    '</div>' +
    '<div class="cal-grid">' + cells + '</div>' +
    '<div style="font-size:0.72rem;color:var(--ft-muted);margin-top:8px;">' +
      'Orange cells = approved time off. Hover or tap for names. ' +
      (isAdmin(curUser()) ? 'Showing all departments.' : 'Showing ' + curUser().dept + ' department.') +
    '</div>' +
  '</div>';
}

function navCal(dir) {
  S.calMonth += dir;
  if (S.calMonth > 11) { S.calMonth = 0; S.calYear++; }
  if (S.calMonth < 0)  { S.calMonth = 11; S.calYear--; }
  render();
}

    '<select class="filter-select" onchange="S.deptFilter=this.value;render();">' +

      '<td><span class="chip chip-blue">' + esc(e.dept) + '</span></td>' +
      '<td>' + b.vacation.used + '/' + b.vacation.total + (b.vacation.pending > 0 ? ' <span style="color:var(--ft-orange);font-size:0.7rem;">(' + b.vacation.pending + 'p)</span>' : '') + '</td>' +
      '<td>' + b.sick.used + '/' + b.sick.total + '</td>' +

  return filterHtml +
    '<div class="card"><div class="card-title">Team Balances (' + filtered.length + ' employees)</div>' +
      '<div class="table-wrap"><table class="table"><thead><tr>' +
        '<th>Employee</th><th>Department</th><th>Vacation</th><th>Sick</th><th>Total Left</th><th>Pending</th>' +
      '</tr></thead><tbody>' + rows + '</tbody></table></div></div>' +
    '<div class="stats">' +
      '<div class="stat"><div class="stat-value" style="color:var(--ft-blue)">' + totalEmp + '</div><div class="stat-label">Team Members</div></div>' +
      '<div class="stat"><div class="stat-value" style="color:var(--ft-orange)">' + totalPending + '</div><div class="stat-label">Pending Requests</div></div>' +
      '<div class="stat"><div class="stat-value" style="color:var(--ft-green)">' + totalUnusedVac + '</div><div class="stat-label">Unused Vacation Days</div></div>' +
    '</div>';
}

// ─── APPROVALS ────────────────────────────────────────────
function viewApprovals() {
  var u = curUser();
  if (!isManager(u)) return '<div class="empty-state">Access restricted to managers and admins.</div>';

  var pending = pendingForMe();
  // Also show recently actioned requests (approved/denied) for context
  var reports = directReports();
  var rIds = {};
  reports.forEach(function(e){ rIds[e.id] = true; });
  var recent = REQ.filter(function(r){ return r.status !== 'pending' && rIds[r.empId]; })
    .sort(function(a,b){ return b.id - a.id; }).slice(0, 5);

  if (pending.length === 0 && recent.length === 0) {
    return '<div class="card empty-state">No pending requests. All caught up!</div>';
  }

  var html = '';

  if (pending.length > 0) {
    html += '<div class="card-title" style="margin-bottom:12px;">Pending Approvals (' + pending.length + ')</div>';
    pending.forEach(function(r) {
      var emp = empById(r.empId);
      var bl = emp.bal[r.type];
      var remainAfter = bl.total - bl.used - bl.pending;
      html += '<div class="card approval-card">' +
        '<div class="approval-header">' +
          '<div><strong>' + esc(emp.name) + '</strong> <span class="chip chip-blue">' + esc(emp.dept) + '</span></div>' +
          '<span class="chip chip-orange">Pending</span>' +
        '</div>' +
        '<div class="approval-details">' +
          '<div><div class="approval-detail-label">Type</div>' + r.type.charAt(0).toUpperCase() + r.type.slice(1) + '</div>' +
          '<div><div class="approval-detail-label">Dates</div>' + r.start + ' to ' + r.end + '</div>' +
          '<div><div class="approval-detail-label">Days</div>' + r.days + '</div>' +
          '<div><div class="approval-detail-label">Balance After</div>' + remainAfter + ' ' + r.type + ' days</div>' +
          (r.reason ? '<div><div class="approval-detail-label">Reason</div>' + esc(r.reason) + '</div>' : '') +
          '<div><div class="approval-detail-label">Submitted</div>' + r.submitted + '</div>' +
        '</div>' +
        '<div class="approval-actions">' +
          '<button class="btn btn-approve btn-sm" onclick="approveReq(' + r.id + ')">Approve</button>' +
          '<button class="btn btn-deny btn-sm" onclick="denyReq(' + r.id + ')">Deny</button>' +
        '</div>' +
      '</div>';
    });
  }

  if (recent.length > 0) {
    html += '<div class="card-title" style="margin-bottom:12px;margin-top:20px;">Recent Decisions</div>';
    recent.forEach(function(r) {
      var emp = empById(r.empId);
      var chipClass = r.status === 'approved' ? 'chip-green' : 'chip-red';
      var cardClass = r.status === 'approved' ? 'approved' : 'denied';
      html += '<div class="card approval-card ' + cardClass + '">' +
        '<div class="approval-header">' +
          '<div><strong>' + esc(emp.name) + '</strong> <span class="chip chip-blue">' + esc(emp.dept) + '</span></div>' +
          '<span class="chip ' + chipClass + '">' + r.status + '</span>' +
        '</div>' +
        '<div style="font-size:0.82rem;color:var(--ft-muted);">' +
          r.type.charAt(0).toUpperCase() + r.type.slice(1) + ' &middot; ' +
          r.start + ' to ' + r.end + ' &middot; ' + r.days + ' day(s)' +
          (r.reason ? ' &middot; ' + esc(r.reason) : '') +
        '</div>' +
      '</div>';
    });
  }

  return html;
}

function approveReq(id) {
  var r = null;
  for (var i = 0; i < REQ.length; i++) { if (REQ[i].id === id) { r = REQ[i]; break; } }
  if (!r || r.status !== 'pending') return;

  r.status = 'approved';
  var emp = empById(r.empId);
  if (emp) {
    emp.bal[r.type].used += r.days;
    emp.bal[r.type].pending -= r.days;
  }
  toast('Approved: ' + (emp ? emp.name : '?') + ' - ' + r.days + ' day(s) ' + r.type);
  render();
}

function denyReq(id) {
  var r = null;
  for (var i = 0; i < REQ.length; i++) { if (REQ[i].id === id) { r = REQ[i]; break; } }
  if (!r || r.status !== 'pending') return;

  r.status = 'denied';
  var emp = empById(r.empId);
  if (emp) {
    emp.bal[r.type].pending -= r.days;
  }
  toast('Denied: ' + (emp ? emp.name : '?') + ' - ' + r.type + ' request');
  render();
}

// ─── SETTINGS ────────────────────────────────────────────
function viewSettings() {
  var u = curUser();
  return '<div class="card"><div class="card-title">Change Your PIN</div>' +
    '<div class="pin-change-box">' +
      '<div class="form-group">' +
        '<label class="form-label">Current PIN</label>' +
        '<input type="password" class="form-input" id="curPin" maxlength="4" inputmode="numeric" pattern="[0-9]*" placeholder="Enter current PIN">' +
      '</div>' +
      '<div class="form-group">' +
        '<label class="form-label">New PIN (4 digits)</label>' +
        '<input type="password" class="form-input" id="newPin" maxlength="4" inputmode="numeric" pattern="[0-9]*" placeholder="4 digits">' +
      '</div>' +
      '<div class="form-group">' +
        '<label class="form-label">Confirm New PIN</label>' +
        '<input type="password" class="form-input" id="confirmPin" maxlength="4" inputmode="numeric" pattern="[0-9]*" placeholder="4 digits" onkeydown="if(event.key===\'Enter\')changePin()">' +
      '</div>' +
      '<button class="btn btn-primary" onclick="changePin()">Update PIN</button>' +
    '</div>' +
  '</div>' +
  (isAdmin(u) ? '<div class="card"><div class="card-title">All Employee PINs (Admin Only)</div>' +
    '<div style="font-size:0.8rem;color:var(--ft-muted);margin-bottom:12px;">Use this to help employees who forgot their PIN.</div>' +
    '<div class="table-wrap"><table class="table"><thead><tr><th>Name</th><th>Department</th><th>PIN</th></tr></thead><tbody>' +
    EMP.map(function(e) {
      return '<tr><td>' + esc(e.name) + '</td><td><span class="chip chip-blue">' + esc(e.dept) + '</span></td><td><code style="font-size:0.9rem;font-weight:700;">' + e.pin + '</code></td></tr>';
    }).join('') +
    '</tbody></table></div></div>' : '');
}

function changePin() {
  var curPin = document.getElementById('curPin').value;
  var newPin = document.getElementById('newPin').value;
  var confirmPin = document.getElementById('confirmPin').value;
  var u = curUser();

  if (curPin !== u.pin) { toast('Current PIN is incorrect.'); return; }
  if (newPin.length !== 4 || !/^\d{4}$/.test(newPin)) { toast('New PIN must be exactly 4 digits.'); return; }
  if (newPin !== confirmPin) { toast('New PINs do not match.'); return; }
  if (newPin === curPin) { toast('New PIN must be different from current PIN.'); return; }

  u.pin = newPin;
  savePins();
  toast('PIN updated successfully.');
  document.getElementById('curPin').value = '';
  document.getElementById('newPin').value = '';
  document.getElementById('confirmPin').value = '';
}

// ─── INIT ─────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  populateLoginSelect();
});
</script>
</body>
</html>
